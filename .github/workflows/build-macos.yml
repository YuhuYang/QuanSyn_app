name: Build macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-app:
    name: app-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-15
          - name: macos-intel
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: qsstudio-build
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Restore Nuitka cache
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Nuitka
            ~/Library/Caches/ccache
            ~/conda_pkgs_dir
          key: ${{ runner.os }}-${{ matrix.name }}-nuitka-${{ hashFiles('requirements-desktop.txt', 'run_desktop.py', 'quansyn_desktop/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.name }}-nuitka-

      - name: Install dependencies
        run: |
          conda install -y networkit scikit-learn numpy scipy pandas matplotlib
          python -m pip install -U pip
          python -m pip install -U nuitka ordered-set zstandard wheel setuptools protobuf "PySide6>=6.7"
          grep -Ev '^(PyQt6|PyQt6-WebEngine|spacy|stanza|networkit|scikit-learn)([<>= ].*)?$' requirements-desktop.txt > requirements-macos-main.txt
          python -m pip install -r requirements-macos-main.txt
          python - <<'PY'
          from pathlib import Path
          for path in Path("quansyn_desktop").rglob("*.py"):
              text = path.read_text(encoding="utf-8")
              text = text.replace("PyQt6", "PySide6")
              text = text.replace("pyqtSignal", "Signal")
              path.write_text(text, encoding="utf-8")
          PY
          python - <<'PY'
          import networkit
          import sklearn
          import PySide6
          import PySide6.QtWebEngineWidgets
          print("dependency_imports_ok", networkit.__version__, sklearn.__version__)
          PY
          {
            python --version
            python -m nuitka --version
            python -m pip freeze
          } | tee build-env.log

      - name: Build app bundle
        run: |
          set -o pipefail
          python -m nuitka run_desktop.py \
            --standalone \
            --macos-create-app-bundle \
            --enable-plugin=pyside6 \
            --follow-imports \
            --include-data-dir=quansyn_desktop/assets=quansyn_desktop/assets \
            --include-package-data=qtawesome \
            --include-package-data=emoji \
            --include-package=networkit \
            --include-package=sklearn \
            --include-package=joblib \
            --include-package=threadpoolctl \
            --include-package=tqdm \
            --include-package=google.protobuf \
            --include-package=packaging \
            --include-module=pdb \
            --include-module=site \
            --include-module=cProfile \
            --include-module=profile \
            --include-module=pstats \
            --include-package=http \
            --include-package=html \
            --include-package=xml \
            --include-package=email \
            --include-package=urllib \
            --include-package=multiprocessing \
            --include-package=concurrent \
            --include-package=sqlite3 \
            --nofollow-import-to=spacy \
            --nofollow-import-to=stanza \
            --nofollow-import-to=torch \
            --nofollow-import-to=spacy_pkuseg \
            --nofollow-import-to=pingouin \
            --nofollow-import-to=statsmodels \
            --nofollow-import-to=sympy \
            --nofollow-import-to=mpmath \
            --nofollow-import-to=xarray \
            --nofollow-import-to=seaborn \
            --nofollow-import-to=patsy \
            --no-deployment-flag=excluded-module-usage \
            --output-dir=dist \
            --output-filename=QuanSynStudio \
            --macos-app-name="QuanSyn Studio" \
            --macos-app-mode=gui \
            --remove-output \
            --assume-yes-for-downloads \
            --lto=no \
            --jobs=4 \
            2>&1 | tee build.log

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Nuitka-build-logs-${{ matrix.name }}
          path: |
            build.log
            build-env.log
            nuitka-crash-report.xml
          if-no-files-found: ignore

      - name: Upload build logs to release on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts build-log-upload
          for f in build.log build-env.log nuitka-crash-report.xml; do
            if [[ -f "$f" ]]; then
              cp "$f" build-log-upload/
            fi
          done
          if [[ ! -f build-log-upload/build.log ]]; then
            echo "No build.log was produced." > build-log-upload/build.log
          fi
          (cd build-log-upload && zip -r "../artifacts/Nuitka-build-logs-${{ matrix.name }}-${{ github.run_id }}.zip" .)
          gh release view v0.0.1 >/dev/null 2>&1 || gh release create v0.0.1 --title "qsstudio0.0.1" --notes "QuanSyn Studio 0.0.1"
          gh release upload v0.0.1 "artifacts/Nuitka-build-logs-${{ matrix.name }}-${{ github.run_id }}.zip" --clobber

      - name: Locate app bundle
        id: app
        shell: bash
        run: |
          set -euo pipefail
          app_path="$(find dist -maxdepth 3 -name '*.app' -type d | head -n 1)"
          if [[ -z "${app_path}" ]]; then
            echo "No .app bundle found under dist"
            find dist -maxdepth 4 -print
            exit 1
          fi
          exe_path="$(find "${app_path}/Contents/MacOS" -maxdepth 1 -type f -perm -111 | head -n 1)"
          if [[ -z "${exe_path}" ]]; then
            echo "No executable found in ${app_path}/Contents/MacOS"
            find "${app_path}" -maxdepth 4 -print
            exit 1
          fi
          echo "app_path=${app_path}" >> "$GITHUB_OUTPUT"
          echo "exe_path=${exe_path}" >> "$GITHUB_OUTPUT"
          echo "Found app: ${app_path}"
          echo "Found exe: ${exe_path}"

      - name: Run dependency selftests
        shell: bash
        run: |
          set -uo pipefail
          export QTWEBENGINE_DISABLE_SANDBOX=1
          QUANSYN_SELFTEST=networkit "${{ steps.app.outputs.exe_path }}" > selftest-networkit.log 2>&1
          rc_networkit=$?
          QUANSYN_SELFTEST=sklearn "${{ steps.app.outputs.exe_path }}" > selftest-sklearn.log 2>&1
          rc_sklearn=$?
          cat selftest-networkit.log || true
          cat selftest-sklearn.log || true
          cat "$(dirname "${{ steps.app.outputs.exe_path }}")/selftest.log" > selftest-app.log 2>/dev/null || true
          cat selftest-app.log || true
          if [[ "$rc_networkit" -ne 0 || "$rc_sklearn" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload app diagnostics to release on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p artifacts app-diagnostics
          for f in build.log build-env.log selftest-networkit.log selftest-sklearn.log selftest-app.log nuitka-crash-report.xml; do
            if [[ -f "$f" ]]; then
              cp "$f" app-diagnostics/
            fi
          done
          if [[ ! -f app-diagnostics/selftest-networkit.log ]]; then
            echo "No selftest-networkit.log was produced." > app-diagnostics/selftest-networkit.log
          fi
          (cd app-diagnostics && zip -r "../artifacts/QuanSyn-app-diagnostics-${{ matrix.name }}-${{ github.run_id }}.zip" .)
          gh release view v0.0.1 >/dev/null 2>&1 || gh release create v0.0.1 --title "qsstudio0.0.1" --notes "QuanSyn Studio 0.0.1"
          gh release upload v0.0.1 "artifacts/QuanSyn-app-diagnostics-${{ matrix.name }}-${{ github.run_id }}.zip" --clobber

      - name: Package app bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.app.outputs.app_path }}" "artifacts/QuanSyn-Studio-${{ matrix.name }}.zip"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuanSyn-Studio-${{ matrix.name }}
          path: artifacts/QuanSyn-Studio-${{ matrix.name }}.zip
          if-no-files-found: error

      - name: Upload app to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view v0.0.1 >/dev/null 2>&1 || gh release create v0.0.1 --title "qsstudio0.0.1" --notes "QuanSyn Studio 0.0.1"
          gh release upload v0.0.1 "artifacts/QuanSyn-Studio-${{ matrix.name }}.zip" --clobber

  build-parser-runtime:
    name: parser-runtime-${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runner: macos-15
          - name: macos-intel
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: qsstudio-parser-runtime
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Build parser runtime plugin
        run: |
          set -euo pipefail
          python -m pip install -U pip wheel setuptools
          rm -rf plugin
          mkdir -p plugin/parser_runtime/site-packages
          python -m pip install \
            --target plugin/parser_runtime/site-packages \
            "spacy>=3.8" \
            "stanza>=1.11" \
            "spacy_pkuseg>=0.0.33"
          cat > plugin/README.txt <<'TXT'
          QuanSyn Studio parser runtime plugin.

          Install by extracting this archive next to the QuanSyn Studio executable,
          or import it from the Model Manager if your build supports runtime import.

          This package contains parser runtime libraries only. Parser models should
          be installed or imported separately.
          TXT
          python - <<'PY'
          import sys
          from pathlib import Path
          root = Path("plugin/parser_runtime/site-packages").resolve()
          sys.path.insert(0, str(root))
          import spacy
          import stanza
          import spacy_pkuseg
          print("parser_runtime_ok", spacy.__version__, stanza.__version__, spacy_pkuseg.__file__)
          PY

      - name: Package parser runtime plugin
        run: |
          set -euo pipefail
          mkdir -p artifacts
          (cd plugin && zip -r "../artifacts/QuanSyn-parser-runtime-${{ matrix.name }}.zip" .)

      - name: Upload parser runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuanSyn-parser-runtime-${{ matrix.name }}
          path: artifacts/QuanSyn-parser-runtime-${{ matrix.name }}.zip
          if-no-files-found: error

      - name: Upload parser runtime to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view v0.0.1 >/dev/null 2>&1 || gh release create v0.0.1 --title "qsstudio0.0.1" --notes "QuanSyn Studio 0.0.1"
          gh release upload v0.0.1 "artifacts/QuanSyn-parser-runtime-${{ matrix.name }}.zip" --clobber
